<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣演出資訊整合站</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .filter-btns { text-align: center; margin-bottom: 20px; }
        .filter-btns button { padding: 8px 16px; margin: 5px; cursor: pointer; border: none; border-radius: 20px; background: #ddd; font-weight: bold; }
        .filter-btns button:hover { background: #ccc; }
        .filter-btns button.active { background: #1d3557; color: white; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #1d3557; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-right: 5px; margin-bottom: 10px;}
        .tag-north { background: #d1fae5; color: #065f46; }
        .tag-central { background: #fef3c7; color: #92400e; }
        .tag-south { background: #fee2e2; color: #991b1b; }
        .tag-east { background: #e0e7ff; color: #3730a3; }
        .tag-other { background: #f3f4f6; color: #374151; }
        .tag-source { background: #ffe4e6; color: #be123c; }
        .date { color: #e63946; font-weight: bold; }
        .btn { display: inline-block; padding: 8px 12px; background: #1d3557; color: white; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">🎸 台灣演出資訊整合站</h1>
        <p style="text-align: center; color: #666;">資料每天早上自動更新！ (目前來源：KKTIX, iNDIEVOX)</p>
        
        <div class="filter-btns">
            <button onclick="filterEvents('全部')" class="active" id="btn-all">全台灣</button>
            <button onclick="filterEvents('北部')">北部</button>
            <button onclick="filterEvents('中部')">中部</button>
            <button onclick="filterEvents('南部')">南部</button>
            <button onclick="filterEvents('東部')">東部</button>
        </div>

        <div id="event-list">資料載入中...（如果一直停在這裡，請稍後再試）</div>
    </div>

    <script>
        let allEvents = [];
        
        // 為了避免瀏覽器抓到舊的 data.json，我們在網址後面加一個隨機時間戳記
        const timestamp = new Date().getTime();
        
        fetch(`data.json?t=${timestamp}`)
            .then(response => response.json())
            .then(data => {
                allEvents = data;
                renderEvents(allEvents);
            })
            .catch(error => {
                document.getElementById('event-list').innerHTML = '<p style="text-align:center; color:red;">無法載入最新資料，請確認 GitHub Actions 是否執行成功。</p>';
                console.error("資料載入失敗:", error);
            });

        function renderEvents(events) {
            const list = document.getElementById('event-list');
            if (events.length === 0) {
                list.innerHTML = '<p style="text-align:center;">此分類目前沒有活動喔！</p>';
                return;
            }
            list.innerHTML = ''; 
            events.forEach(event => {
                // 判斷地區標籤的顏色
                let regionClass = 'tag-other';
                if (event.region === '北部') regionClass = 'tag-north';
                if (event.region === '中部') regionClass = 'tag-central';
                if (event.region === '南部') regionClass = 'tag-south';
                if (event.region === '東部') regionClass = 'tag-east';

                const card = `
                    <div class="card">
                        <div>
                            <span class="tag ${regionClass}">${event.region}</span>
                            <span class="tag tag-source">${event.source}</span>
                        </div>
                        <h2>${event.title}</h2>
                        <p>📍 地點：${event.location}</p>
                        <p class="date">🔥 搶票時間：${event.ticket_date}</p>
                        <p style="font-size: 12px; color: #888;">(最後更新：${event.last_updated})</p>
                        <a href="${event.link}" target="_blank" class="btn">前往售票網頁</a>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        function filterEvents(region) {
            // 處理按鈕的視覺效果
            document.querySelectorAll('.filter-btns button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 過濾資料
            if (region === '全部') {
                renderEvents(allEvents);
            } else {
                const filteredData = allEvents.filter(e => e.region === region);
                renderEvents(filteredData);
            }
        }
    </script>
</body>
</html>
