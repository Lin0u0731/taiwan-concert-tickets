name: Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 時間 00:00 (台灣早上 8 點) 自動執行
  workflow_dispatch: # 允許我們在 GitHub 網頁上手動按按鈕執行

permissions:
  contents: write # 允許機器人把更新的資料存回你的 GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update concert data"
          git push
